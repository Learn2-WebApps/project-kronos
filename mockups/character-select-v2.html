<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project KRONOS - Character Select v2.2</title>
    <!-- Fonts -->
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Gaegu&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Serif+KR:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* 디지털 다크 (대화·UI) */
            --bg-base: #0a0a0a;
            --border-subtle: rgba(255, 255, 255, 0.06);

            /* 텍스트 */
            --text-primary: #f0ebe0;
            --text-secondary: #a8a29a;
            --text-muted: #6b6660;

            /* 캐릭터 테마 */
            --char-jung: #c97a3a;     /* 정민호 - 앰버 */
            --char-han: #5a8cc9;      /* 한지훈 - 블루 */
            --char-yoon: #9b6fb8;     /* 윤서경 - 퍼플 */
            --char-kang: #6ba373;     /* 강혜린 - 그린 */
            --char-oh: #c95a7a;       /* 오세라 - 로즈 */
            --accent-amber: #d4a574;

            /* Typography Scaling */
            --font-main: 'Pretendard', sans-serif;
            --font-serif: 'Noto Serif KR', serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-main);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 전역 그레인 오버레이 */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* 중앙 비네팅 */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9998;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 100%);
        }

        /* 상단 바 (56px) */
        .top-bar {
            height: 56px;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-btn:hover { color: var(--text-primary); }

        .title {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.2em;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .timer-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 20px;
            color: var(--text-primary);
        }

        /* 메인 영역 */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            z-index: 10;
        }

        .card-container {
            display: flex;
            gap: 24px;
            max-width: 100%;
            overflow-x: auto;
            padding: 20px 0; /* hover lift 공간 확보 */
        }

        /* 스크롤바 숨기기 (웹킷 기반) */
        .card-container::-webkit-scrollbar {
            display: none;
        }

        /* 선택 카드 */
        .suspect-select-card {
            width: 360px;
            height: 600px;
            border-radius: 4px;
            border: 1px solid var(--border-subtle);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s ease, border-color 0.3s ease;
            flex-shrink: 0;
            background-color: #1a1a1a;
        }

        .card-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            transition: transform 0.5s ease;
        }

        .suspect-select-card:hover .card-bg {
            transform: scale(1.03);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 30%, transparent 60%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 32px;
            transition: background 0.3s ease;
        }

        .suspect-select-card:hover .card-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 40%, transparent 70%);
        }

        .turns-remaining {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 20px;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-info {
            transform: translateY(10px);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .suspect-select-card:hover .card-info {
            transform: translateY(0);
        }

        .card-info h3 {
            font-family: var(--font-serif);
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 6px;
        }

        .card-info p {
            font-family: var(--font-main);
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* 캐릭터별 Hover 효과 */
        .suspect-select-card[data-character="jung-minho"]:hover {
            transform: translateY(-8px);
            border-color: var(--char-jung);
            box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 24px rgba(201, 122, 58, 0.2);
        }
        .suspect-select-card[data-character="han-jihun"]:hover {
            transform: translateY(-8px);
            border-color: var(--char-han);
            box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 24px rgba(90, 140, 201, 0.2);
        }
        .suspect-select-card[data-character="yoon-seokyung"]:hover {
            transform: translateY(-8px);
            border-color: var(--char-yoon);
            box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 24px rgba(155, 111, 184, 0.2);
        }
        .suspect-select-card[data-character="kang-hyerin"]:hover {
            transform: translateY(-8px);
            border-color: var(--char-kang);
            box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 24px rgba(107, 163, 115, 0.2);
        }
        .suspect-select-card[data-character="oh-sera"]:hover {
            transform: translateY(-8px);
            border-color: var(--char-oh);
            box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 24px rgba(201, 90, 122, 0.2);
        }

        /* 0턴 캐릭터 (조사 종료) */
        .suspect-select-card.exhausted {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(80%);
        }
        .suspect-select-card.exhausted:hover {
            transform: none;
            border-color: var(--border-subtle);
            box-shadow: none;
        }
        .suspect-select-card.exhausted .turns-remaining {
            background: rgba(201, 72, 61, 0.8);
            border-color: transparent;
        }
        
        .exhausted-label {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-main);
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.8);
            z-index: 10;
            background: rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .suspect-select-card.exhausted:hover .exhausted-label {
            opacity: 1;
        }

        /* 반응형: 화면이 좁을 때 가로 스크롤 허용, 너무 좁으면 작게 */
        @media (max-width: 1920px) {
            .card-container {
                justify-content: flex-start;
                padding: 20px 40px;
            }
        }
        
        @media (max-height: 800px) {
            .suspect-select-card {
                height: 500px;
                width: 300px;
            }
        }

        /* Icons */
        .icon { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <header class="top-bar">
        <div class="header-left">
            <div class="back-btn">
                <svg class="icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </div>
            <div class="title">용의자 선택</div>
        </div>
        <div class="timer-container">
            <svg class="icon" style="color: var(--accent-amber); width: 20px; height: 20px;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>27:43</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="card-container">
            
            <!-- Card 1 -->
            <div class="suspect-select-card" data-character="jung-minho">
                <img src="../assets/characters/jung-minho-background.png" class="card-bg" onerror="this.style.opacity=0.2; this.alt='이미지 누락'">
                <div class="card-overlay">
                    <span class="turns-remaining">10 / 10</span>
                    <div class="card-info">
                        <h3>정민호</h3>
                        <p>전략기획팀장</p>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="suspect-select-card" data-character="han-jihun">
                <img src="../assets/characters/han-jihun-background.png" class="card-bg" onerror="this.style.opacity=0.2; this.alt='이미지 누락'">
                <div class="card-overlay">
                    <span class="turns-remaining">10 / 10</span>
                    <div class="card-info">
                        <h3>한지훈</h3>
                        <p>전 상무 (참고인)</p>
                    </div>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="suspect-select-card" data-character="yoon-seokyung">
                <img src="../assets/characters/yoon-seokyung-background.png" class="card-bg" onerror="this.style.opacity=0.2; this.alt='이미지 누락'">
                <div class="card-overlay">
                    <span class="turns-remaining">7 / 10</span>
                    <div class="card-info">
                        <h3>윤서경</h3>
                        <p>사업본부장</p>
                    </div>
                </div>
            </div>

            <!-- Card 4 (Exhausted Example) -->
            <div class="suspect-select-card exhausted" data-character="kang-hyerin">
                <img src="../assets/characters/kang-hyerin-background.png" class="card-bg" onerror="this.style.opacity=0.2; this.alt='이미지 누락'">
                <div class="card-overlay">
                    <span class="turns-remaining">0 / 10</span>
                    <div class="card-info">
                        <h3>강혜린</h3>
                        <p>인사팀 차장</p>
                    </div>
                </div>
                <div class="exhausted-label">조사 종료</div>
            </div>

            <!-- Card 5 -->
            <div class="suspect-select-card" data-character="oh-sera">
                <img src="../assets/characters/oh-sera-background.png" class="card-bg" onerror="this.style.opacity=0.2; this.alt='이미지 누락'">
                <div class="card-overlay">
                    <span class="turns-remaining">10 / 10</span>
                    <div class="card-info">
                        <h3>오세라</h3>
                        <p>티타니아 부사장</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
